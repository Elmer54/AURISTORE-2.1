<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrador</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-content">

<section class="hero">
<h2>PANEL</h2>
<h1>ADMINISTRADOR</h1>

<div class="admin-form">

<input type="text" id="name" placeholder="Nombre producto">
<input type="number" id="price" placeholder="Precio">

<select id="category">
<option value="scripts">Scripts</option>
<option value="maps">Maps</option>
<option value="packs">Packs</option>
</select>

<input type="file" id="imageInput" accept=".png,.jpg,.jpeg,.webp">
<img id="preview" class="preview-image" style="display:none;">

<button onclick="addProduct()">Agregar Producto</button>

<hr>

<h2>Configuración de Color</h2>
<input type="color" id="themeColor">
<button onclick="changeTheme()">Cambiar Color</button>

<hr>

<h2>Ventas Registradas</h2>
<div id="salesContainer"></div>

<hr>

<h2>Usuarios Registrados</h2>
<div id="usersContainer"></div>

</div>
</section>
</div>

<script src="admin.js"></script>
</body>
</html>
