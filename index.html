<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURIASTORE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
<div class="logo">AURIASTORE</div>

<div class="search-box">
<input type="text" placeholder="Busca lo que se te ocurra">
</div>

<div class="actions">
<button onclick="openCart()">🛒 Carrito</button>
</div>
</header>

<div class="container">

<div class="products" id="products"></div>

<div class="cart-page" id="cartPage">

<h1>Tu carrito</h1>

<div id="cartItems"></div>

<div class="payment-box">

<h2>Forma de pago</h2>

<div class="payment-method">
<input type="radio" name="pay" checked>
<label>Tarjeta de crédito</label>
</div>

<div class="cards">
<div>VISA</div>
<div>MASTERCARD</div>
<div>PAYPAL</div>
</div>

<div class="payment-method">
<input type="radio" name="pay">
<label>Transferencia bancaria</label>
</div>

<div class="bank-info">
<p><strong>Banco:</strong> Pichincha</p>
<p><strong>Cuenta:</strong> 1234567890</p>
<p><strong>Nombre:</strong> AURIASTORE</p>
<p><strong>Email:</strong> pagos@auriastore.com</p>
</div>

<h2 id="totalPrice">Total: $0</h2>

<button class="checkout-btn" onclick="checkout()">
Finalizar compra
</button>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
