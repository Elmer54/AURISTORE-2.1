
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURIASTORE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
<div class="logo">
<h1>AURIA</h1>
<span>STORE</span>
</div>

<nav>
<a class="category-btn active">Home</a>
<a>Scripts</a>
<a>Maps</a>
<a>Packs</a>
<a href="admin.html">Admin</a>
</nav>
</div>

<div class="main-content">

<header class="topbar">

<div id="authContainer">

<button class="login-btn" id="loginBtn" onclick="openAuth()">
SIGN IN
</button>

<div class="user-menu hidden" id="userMenu">

<div class="user-avatar" onclick="toggleUserPanel()">
👤
</div>

<div class="user-dropdown" id="userDropdown">

<h3 id="profileName">Usuario</h3>

<input type="text" id="updateName" placeholder="Nuevo nombre">

<input type="email" id="updateEmail" placeholder="Nuevo correo">

<input type="password" id="updatePassword" placeholder="Nueva contraseña">

<button onclick="updateProfile()">
Actualizar Datos
</button>

<button onclick="logoutUser()">
Cerrar Sesión
</button>

</div>

</div>

</div>

<div class="cart-icon" id="cartButton">
<div class="cart-logo">🛒</div>
<span id="cartCount">0</span>
</div>

</header>

<section class="hero">
<h2>WELCOME TO</h2>
<h1>AURIASTORE</h1>
<p>Marketplace premium para FiveM.</p>
</section>

<section class="products" id="productsContainer"></section>

</div>

<div class="cart-panel" id="cartPanel">

<div class="cart-header">
<h2>Carrito</h2>

<button class="close-cart" onclick="closeCart()">
✕
</button>
</div>

<div id="cartItems"></div>

<div class="cart-footer">
<h3>Total: <span id="cartTotal">$0</span></h3>

<button onclick="checkout()">
Finalizar Compra
</button>
</div>

</div>

<div class="auth-modal" id="authModal">

<div class="auth-box">

<h2>Registro / Login</h2>

<input type="text" id="userName" placeholder="Nombre">

<input type="email" id="userEmail" placeholder="Correo">

<input type="password" id="userPassword" placeholder="Contraseña">

<button onclick="registerUser()">Registrarse</button>

<button onclick="loginUser()">Ingresar</button>

<button onclick="googleLogin()">Continuar con Google</button>

<button onclick="facebookLogin()">Continuar con Facebook</button>

<button onclick="closeAuth()">Cerrar</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
