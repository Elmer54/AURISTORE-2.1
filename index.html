<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURIASTORE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <h1>AURIA</h1>
        <span>STORE</span>
    </div>

    <nav>
        <a class="active" href="#">Home</a>
        <a href="#">Scripts</a>
        <a href="#">Maps</a>
        <a href="#">Packs</a>
        <a href="admin.html">Admin</a>
    </nav>

    <div class="side-box">
        <h3>DOCUMENTATION</h3>
        <p>Accede a la documentación de la tienda.</p>
    </div>
</div>

<div class="main-content">

<header>
    <button class="login-btn">SIGN IN</button>
</header>

<section class="hero">
    <h2>WELCOME TO</h2>
    <h1>AURIASTORE</h1>
    <p>
        Marketplace premium para FiveM con scripts,

</section>

<section class="products">

<div class="card">
    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">
    <div class="card-info">
        <h3>PACK PREMIUM</h3>
        <p>€28 EUR</p>
        <button>Comprar</button>
    </div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200&auto=format&fit=crop">
    <div class="card-info">
        <h3>POLICE + EMS</h3>
        <p>€82 EUR</p>
        <button>Comprar</button>
    </div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1560419015-7c427e8ae5ba?q=80&w=1200&auto=format&fit=crop">
    <div class="card-info">
        <h3>UNIQUE SCRIPTS</h3>
        <p>€49 EUR</p>
        <button>Comprar</button>
    </div>
</div>

</section>

</div>

<script src="app.js"></script>
