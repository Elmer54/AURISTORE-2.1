
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURIASTORE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <h1>AURIA</h1>
        <span>STORE</span>
    </div>

    <nav>
        <a class="category-btn active" data-category="all">Home</a>
        <a class="category-btn" data-category="scripts">Scripts</a>
        <a class="category-btn" data-category="maps">Maps</a>
        <a class="category-btn" data-category="packs">Packs</a>
        <a href="admin.html">Admin</a>
    </nav>
</div>

<div class="main-content">

<header>
<button class="login-btn" onclick="openAuth()">SIGN IN</button>
<button class="cart-btn" onclick="toggleCart()">🛒 Carrito</button>
</header>

<section class="hero">
<h2>WELCOME TO</h2>
<h1>AURIASTORE</h1>
<p>Marketplace premium para FiveM con scripts, packs y contenido exclusivo.</p>
</section>

<section class="products" id="productsContainer"></section>

</div>

<div class="cart-panel" id="cartPanel">
<h2>Carrito</h2>
<div id="cartItems"></div>
<h3 id="cartTotal">Total: $0</h3>
<button class="buy-btn" onclick="checkout()">Comprar</button>
</div>

<div class="auth-modal" id="authModal">
<div class="auth-box">
<h2>Ingresar / Registro</h2>

<input type="text" id="username" placeholder="Usuario">
<input type="email" id="email" placeholder="Correo">
<input type="password" id="password" placeholder="Contraseña">

<button onclick="registerUser()">Registrarse</button>
<button onclick="loginUser()">Ingresar</button>
<button onclick="closeAuth()">Cerrar</button>
</div>
</div>

<script src="app.js"></script>
</body>
</html>
